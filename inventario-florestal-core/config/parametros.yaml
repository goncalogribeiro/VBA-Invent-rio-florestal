# =============================================================================
# 16. DESBASTE — SEÇÃO OPERACIONAL v3.1
# =============================================================================
desbaste:
  descricao: "Regras operacionais de desbaste para prognose e manejo de Pinus spp."
  versao: "1.0"
  unidade_area_basal: "m2"

  tipos:
    seletivo:
      ativo: true
      descricao: "Remoção individual de árvores por critérios qualitativos, sociológicos e biométricos."
      gatilhos_permitidos:
        - numero_arvores
        - area_basal
        - percentual_arvores
        - percentual_area_basal

    sistematico:
      ativo: false
      status: "documentado_para_integracao_posterior"
      descricao: "Remoção por regra geométrica ou operacional, como linhas ou corredores."
      exemplos:
        - "remocao_de_linha"
        - "abertura_de_corredor"

    misto:
      ativo: false
      status: "documentado_para_integracao_posterior"
      descricao: "Combinação de remoção sistemática e seleção individual nas linhas remanescentes."
      regra_geral:
        etapa_1: "aplicar remocao sistematica planejada"
        etapa_2: "aplicar selecao qualitativa nas arvores remanescentes"

  gatilhos:
    numero_arvores:
      descricao: "Interrompe a seleção ao atingir o número ou percentual de árvores removidas."
      unidade_padrao: "percentual"
      minimo: 0.0
      maximo: 0.60

    area_basal:
      descricao: "Interrompe a seleção ao atingir a área basal ou percentual de G removido."
      unidade_padrao: "percentual"
      minimo: 0.0
      maximo: 0.60

  prioridade_qualitativa:
    - codigo: "copa_quebrada"
      prioridade: 1
      codigo_qualidade_origem: 10
      descricao: "Árvore com copa quebrada."
    - codigo: "bifurcacao_baixa"
      prioridade: 2
      codigo_qualidade_origem: 3
      descricao: "Bifurcação baixa, com maior impacto na qualidade do fuste."
    - codigo: "macacao_prego"
      prioridade: 3
      codigo_qualidade_origem: 8
      descricao: "Defeito operacional/qualitativo do tipo macacão ou prego."
    - codigo: "torta"
      prioridade: 4
      codigo_qualidade_origem: 2
      descricao: "Árvore torta."
    - codigo: "bifurcacao_alta"
      prioridade: 5
      codigo_qualidade_origem: 4
      descricao: "Bifurcação alta, penalidade menor que bifurcação baixa."
    - codigo: "falha"
      prioridade: 6
      codigo_qualidade_origem: 5
      descricao: "Falha ou indivíduo inadequado para manutenção quando aplicável."
    - codigo: "morta"
      prioridade: 7
      codigo_qualidade_origem: 9
      descricao: "Árvore morta; deve ser removida quando a rotina de saneamento estiver ativa."
    - codigo: "sem_defeito_grave"
      prioridade: 99
      codigo_qualidade_origem: 1
      descricao: "Árvore boa ou sem defeito prioritário."

  prioridade_sociologica:
    suprimida: 10
    dominada: 20
    codominante: 30
    dominante: 40

  regras_seletivas:
    ordem_primaria: "qualidade"
    ordem_secundaria: "classe_sociologica"
    ordem_terciaria: "area_basal_individual"
    usar_qualidade_antes_da_sociologia: true
    usar_g_individual: true
    manter_dominantes_quando_possivel: true
    recalcular_estrutura_pos_intervencao: true
    aplicar_mesmos_criterios_para_g_e_numero_arvores: true

  formula_area_basal_individual:
    expressao: "gi = pi * DAP_cm^2 / 40000"
    unidade_saida: "m2"
    dap_unidade: "cm"

  limites_operacionais:
    percentual_remocao_maximo_padrao: 0.45
    percentual_remocao_alerta: 0.40
    percentual_g_maximo_padrao: 0.45
    percentual_g_alerta: 0.40
    observacao: "Valores acima destes limites exigem justificativa técnica e validação de estabilidade."

  cenarios_referencia:
    leve:
      percentual_arvores: 0.20
      percentual_g: 0.20
    moderado:
      percentual_arvores: 0.30
      percentual_g: 0.30
    pesado:
      percentual_arvores: 0.40
      percentual_g: 0.40

