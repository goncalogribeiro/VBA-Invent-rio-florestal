# =============================================================================
# 11. FATORES DE CORREÇÃO
# =============================================================================
correcoes:
  fator_meyer:
    nome: "Fator de Meyer"
    formula: "FM = exp(0.5 * QM_res)"
    descricao: "Corrige discrepância logarítmica em modelos com ln(Y)."
    aplicacao: "Y_corrigido = exp(ln(Y_est)) * FM"
    fonte: "Meyer (1941); Pertille (2017)"
    unidade: "adimensional"

  retransformacao_log:
    nome: "Retransformação para escala linear"
    formula: "Y_est = exp(ln_Y_est) * FM"
    descricao: "Converte estimativas de modelos logarítmicos para a unidade original."
    observacao: "Sempre aplicar o Fator de Meyer."
    unidade: "original"

# =============================================================================
# 12. CLASSES DE SÍTIO
# =============================================================================
classes_sitio:
  idade_referencia: 20
  unidade_idade: "anos"
  descricao: "Idade de referência padronizada para classificação de sítios na região Sul do Brasil."
  metodo: "Altura dominante (h_dom) - critério de Assmann."
  classes: []

# =============================================================================
# 13. FÓRMULA tCO₂
# =============================================================================
formula_tco2:
  descricao: "Cálculo de toneladas de CO2 equivalente estocadas na madeira."
  formula_direta: "tCO₂ = (Vol + 34%) × Dens_Basica × C × CO2"
  parametros:
    acrescimo_bark:
      valor: 1.34
    densidade_basica:
      valor: 0.36
      unidade: "t/m³"
    carbono:
      valor: 0.50
    co2:
      valor: 3.66
  simplificacao: "tCO₂ = Vol × 0.882792"
  unidade: "tCO₂/ha"

