    - "Viana (2016); Wendling et al. (2011); Schmidt (2014)"
    - "Carelli Netto (2008); Ferraz Filho (2009); Retslaff et al. (2020)"
    - "Oliveira (1995); Banhado Grande (parametros.yaml)"

