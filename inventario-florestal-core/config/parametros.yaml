# =============================================================================
# 20. ÍNDICES DE MANEJO FLORESTAL
# =============================================================================
indices_manejo_florestal:
  hart_becking:
    nome: "Índice de Hart-Becking"
    formula_direta: "S% = (espaçamento_medio / altura_dominante) × 100"
  reineke_densidade_maxima:
    nome: "% da Densidade Máxima (Modelo de Reineke)"
    equacao_direta: "log10(N) = log10(a) - 1.605 × log10(DAP)"
  ima:
    nome: "Incremento Médio Anual (IMA)"
    formula_direta: "IMA = Volume_Total / Idade"

# =============================================================================
# 21. REFERÊNCIAS BIBLIOGRÁFICAS
# =============================================================================
referencias:
  - id: REF01
    fonte: "Modelo de Reineke"
    equacao: "log10(N) = log10(a) - 1.605×log10(DAP)"
    tipo_log: "log10 (base 10)"
    assunto: "densidade florestal"
  - id: REF02
    fonte: "Embrapa - Softwares Sis para manejo"
    ano: 2014
    link: "https://www.alice.cnptia.embrapa.br/alice/bitstream/doc/995436/1/2014EdilsonAgriculturaPrecisaoSilvicultura.pdf"
    observacao_logaritmos: "Todas as equações utilizam ln (logaritmo natural)."

